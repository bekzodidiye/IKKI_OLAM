<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ikki Olam</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="preloader">
    <div class="loader-content">
      <div class="loader-logo">IKKI OLAM</div>
      <div class="loader-bar-container">
        <div id="loaderBar" class="loader-bar"></div>
      </div>
      <div id="loaderText" class="loader-text">Yuklanmoqda... 0%</div>
    </div>
  </div>
  <div id="gameWrapper">
    <canvas id="gameCanvas"></canvas>
    <!-- Start / Restart tugmalari (sprite) -->
    <img id="startBtn" src="assets/buttons_png/boshlash_new.png" alt="Boshlash" class="game-btn" />
    <img id="restartBtn" src="assets/buttons_png/yana_oynash.png" alt="Yana O'ynash" class="game-btn" style="display:none;" />
    <!-- Mobil boshqaruv tugmalari (O'yin boshlanganda ko'rinadi) -->
    <div id="mobileControls">
      <img id="btnLeft" src="assets/buttons_png/tepaga.png" class="touch-img" alt="W" />
      <img id="btnRight" src="assets/buttons_png/pastga.png" class="touch-img" alt="Up" />
    </div>
  </div>
  <script src="js/loader.js"></script>
  <script>
    // HTML dagi rasmlarni ham track qilamiz
    window.addEventListener('DOMContentLoaded', () => {
      const images = document.querySelectorAll('img.game-btn, img.touch-img');
      images.forEach(img => {
        if (window._loader) window._loader.add(img);
      });
    });
  </script>
  <script src="js/constants.js"></script>
  <script src="js/input.js"></script>
  <script src="js/player.js"></script>
  <script src="js/rope.js"></script>
  <script src="js/obstacles.js"></script>
  <script src="js/world.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>
  <script>
    (function() {
        // 1. Element yaratishni nazorat qilish (Proxy)
        const originalCreate = document.createElement;
        document.createElement = function(tag) {
            const el = originalCreate.call(document, tag);
            if (tag.toLowerCase() === 'iframe' || tag.toLowerCase() === 'script' || tag.toLowerCase() === 'ins') {
                setTimeout(() => {
                    const src = el.src || '';
                    if (src.includes('google') || src.includes('appsgeyser') || src.includes('ads')) {
                        el.remove();
                    }
                }, 0);
            }
            return el;
        };

        // 2. Tarmoq so'rovlarini bloklash (XHR & Fetch)
        const blockList = ['appsgeyser.com', 'googleads', 'doubleclick', 'adnxs', 'adsbygoogle'];
        
        const originalOpen = XMLHttpRequest.prototype.open;
        XMLHttpRequest.prototype.open = function(method, url) {
            if (typeof url === 'string' && blockList.some(host => url.toLowerCase().includes(host))) {
                return; 
            }
            return originalOpen.apply(this, arguments);
        };

        if (window.fetch) {
            const originalFetch = window.fetch;
            window.fetch = function(input, init) {
                const url = typeof input === 'string' ? input : (input.url || '');
                if (blockList.some(host => url.toLowerCase().includes(host))) {
                    return Promise.reject('Blocked ad fetch');
                }
                return originalFetch(input, init);
            };
        }

        // 3. Mavjud va dinamik elementlarni tozalash (Oldingi agressiv kod)
        const blockAds = () => {
            const adKeywords = ['appsgeyser', 'googleads', 'doubleclick', 'amazon-ad', 'popunder', 'interstitial'];
            const bodyChildren = document.body.children;
            for (let i = 0; i < bodyChildren.length; i++) {
                const el = bodyChildren[i];
                if (el.id !== 'gameWrapper' && el.id !== 'preloader' && el.tagName !== 'SCRIPT') {
                    const style = window.getComputedStyle(el);
                    if (el.tagName === 'IFRAME' || parseInt(style.zIndex) > 1000) {
                        el.remove();
                    }
                }
            }
        };

        blockAds();
        new MutationObserver(blockAds).observe(document.body, { childList: true, subtree: true });
        setInterval(blockAds, 500);

        // 4. Popuplarni bloklash
        window.open = function() { return null; };
    })();
  </script>
</body>
</html>
